<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Hobbit — Dicionário EN→PT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text-primary: #1a1209;
    --text-secondary: #6b5c3e;
    --text-muted: #9c8a6e;
    --accent: #8b4513;
    --accent-light: #f5ede3;
    --font-display: 'Palatino Linotype', 'Book Antiqua', Palatino, Georgia, serif;
    --font-body: Georgia, 'Times New Roman', serif;
    --font-ui: system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-strong);
  }

  .rune-bar {
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--accent);
    opacity: 0.5;
    margin-bottom: 0.75rem;
    user-select: none;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: normal;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .controls {
    max-width: 760px;
    margin: 0 auto 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    font-family: var(--font-ui);
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--text-muted); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    font-family: var(--font-ui);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .table-wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead {
    background: var(--accent-light);
    border-bottom: 1px solid var(--border-strong);
  }

  th {
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 14px;
    text-align: left;
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdf8f2; }

  .en {
    font-family: var(--font-body);
    font-weight: bold;
    color: var(--text-primary);
    font-size: 14px;
  }

  .pt {
    font-family: var(--font-body);
    color: var(--text-primary);
    font-size: 14px;
  }

  .note {
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    font-style: italic;
  }

  .badge {
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    display: inline-block;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .cat-personagem { background: #e8f0fb; color: #1a4a8a; border-color: #b8d0f5; }
  .cat-lugar      { background: #e5f5ee; color: #145c3a; border-color: #9adbbe; }
  .cat-criatura   { background: #fdf0e0; color: #7a4a10; border-color: #f5c87a; }
  .cat-objeto     { background: #fbe8f0; color: #7a2048; border-color: #f0b0cc; }
  .cat-outro      { background: #f0ede8; color: #4a3c28; border-color: #c8bfb0; }

  .count {
    max-width: 760px;
    margin: 0.75rem auto 0;
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
    padding-right: 2px;
  }

  .empty {
    padding: 2rem;
    text-align: center;
    font-family: var(--font-ui);
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div class="rune-bar">ᚦᚢᚱᛁᚾ · ᛒᛁᛚᛒᛟ · ᛋᛗᚪᚢᚷ</div>
  <h1>O Hobbit — Dicionário Inglês / Português</h1>
  <p class="subtitle">Guia de tradução de nomes · Edição inglesa ↔ Edição brasileira</p>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar em inglês ou português…" oninput="render()">
  <div class="filters" id="filters"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Inglês (original)</th>
        <th>Português (tradução)</th>
        <th>Categoria</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">Nenhuma entrada encontrada.</div>
</div>
<div class="count" id="count"></div>

<script>

  { en: "The Withered Heath", pt: "A Charneca Murcha", note: "Lar original dos dragões", cat: "lugar" },
  { en: "The Desolation of Smaug", pt: "A Desolação de Smaug", note: "", cat: "lugar" },
  { en: "The Front Gate", pt: "O Portão Principal", note: "Entrada principal de Erebor", cat: "lugar" },

  { en: "The Riddle Game", pt: "O Jogo de Adivinhações", note: "Bilbo vs Gollum", cat: "outro" },
  { en: "My Precious", pt: "Meu Precioso", note: "Fala de Gollum sobre o Anel", cat: "outro" },
  { en: "Thief / Thieving Bagginses", pt: "Ladrão / Bolseiro Ladrão", note: "Gollum referindo-se a Bilbo", cat: "outro" },
  { en: "Second Breakfast", pt: "Segundo Café da Manhã", note: "Tradição hobbit", cat: "outro" },

  { en: "Halflings", pt: "Pequenos / Mediotinos", note: "Como outros povos chamam os hobbits", cat: "outro" },
  { en: "Dwarven / Khuzdul", pt: "Língua dos Anões / Khuzdul", note: "", cat: "outro" },
  { en: "The Crack of Doom", pt: "A Fenda do Destino", note: "Referência a SdA, não O Hobbit", cat: "outro" },
  { en: "Erebor (Kingdom under the Mountain)", pt: "Erebor (O Reino Sob a Montanha)", note: "", cat: "outro" },
  { en: "Long-expected Party", pt: "Festa Há Muito Esperada", note: "Abre SdA, não O Hobbit", cat: "outro" },
];

const cats = ["todos","personagem","lugar","criatura","objeto","outro"];
const labels = { todos:"Todos", personagem:"Personagens", lugar:"Lugares", criatura:"Criaturas", objeto:"Objetos", outro:"Outros" };
let active = "todos";

const filtersEl = document.getElementById("filters");
cats.forEach(c => {
  const b = document.createElement("button");
  b.className = "pill" + (c === active ? " active" : "");
  b.textContent = labels[c];
  b.onclick = () => {
    active = c;
    document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  filtersEl.appendChild(b);
});

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const rows = data.filter(d => {
    const mc = active === "todos" || d.cat === active;
    const mq = !q || d.en.toLowerCase().includes(q) || d.pt.toLowerCase().includes(q) || (d.note||"").toLowerCase().includes(q);
    return mc && mq;
  });
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  if (rows.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    tbody.innerHTML = rows.map(d => `
      <tr>
        <td><span class="en">${d.en}</span></td>
        <td><span class="pt">${d.pt}</span>${d.note ? `<div class="note">${d.note}</div>` : ""}</td>
        <td><span class="badge cat-${d.cat}">${labels[d.cat]}</span></td>
      </tr>
    `).join("");
  }
  document.getElementById("count").textContent = `${rows.length} entradas`;
}
render();
</script>

</html>
